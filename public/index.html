<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>

		<title>Jay 'N Jay Movers | Coming Soon</title>
		<meta
			name="description"
			content="Something awesome is building in the studio. Stay tuned for the official launch."
		/>
		<meta
			name="robots"
			content="index, follow"
		/>
		<link
			rel="preconnect"
			href="https://fonts.googleapis.com"
		/>
		<link
			rel="preconnect"
			href="https://fonts.gstatic.com"
			crossorigin
		/>
		<link
			rel="preload"
			as="style"
			href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap"
			rel="stylesheet"
		/>
		<link
			rel="preload"
			href="assets/images/logo.svg"
			as="image"
			fetchpriority="high"
		/>
		<meta
			property="og:type"
			content="website"
		/>
		<meta
			property="og:title"
			content="Jay 'N Jay Movers | Coming Soon"
		/>
		<meta
			property="og:description"
			content="Something awesome is building in the studio. Stay tuned for the official launch."
		/>
		<meta
			property="og:image"
			content="assets/images/og-image.jpg"
		/>

		<link
			rel="icon"
			href="assets/images/favicon.ico"
			type="image/x-icon"
		/>
		<link
			rel="stylesheet"
			href="assets/css/styles.css"
		/>
	</head>
	<body>
		<div
			class="hero-bg"
			aria-hidden="true"
		></div>

		<main class="content-container">
			<div class="hero-visual">
				<img
					class="hero-logo"
					src="assets/images/logo.svg"
					alt="Brand Logo"
					loading="eager"
				/>
				<h1 class="main-heading">COMING SOON</h1>
			</div>

			<form
				id="notify-form"
				method="POST"
				action="https://broad-poetry-5530.bedlam520.workers.dev/"
				class="notify-form"
			>
				<input
					type="email"
					name="email"
					id="subscriber-email"
					placeholder="Enter your email address"
					required
					aria-label="Email address"
				/>
				<button type="submit">Notify Me</button>
			</form>
			<div
				id="form-message"
				class="form-message"
				aria-live="polite"
			></div>
		</main>

		<script>
			document.getElementById('notify-form').addEventListener('submit', async (e) => {
				e.preventDefault();
				const form = e.target;
				const emailInput = document.getElementById('subscriber-email');
				const messageBox = document.getElementById('form-message');

				messageBox.textContent = 'Sending...';
				messageBox.style.color = '#a1a1aa';

				try {
					const response = await fetch(form.action, {
						method: form.method,
						body: JSON.stringify({ email: emailInput.value }),
						headers: {
							'Content-Type': 'application/json',
							Accept: 'application/json',
						},
					});

					const result = await response.json();

					if (response.ok) {
						messageBox.textContent = result.message || "You're on the list!";
						messageBox.style.color = '#4ade80';
						emailInput.value = '';
					} else {
						throw new Error(result.error || 'Submission failed.');
					}
				} catch (error) {
					messageBox.textContent = error.message || 'Oops! Something went wrong.';
					messageBox.style.color = '#f87171';
				}
			});
		</script>
	</body>
</html>
